name: Expense Tracker CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      ################################################
      # Build & Push Backend
      ################################################

      - name: Build Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: khalilart/expense-tracker-backend:latest

      ################################################
      # Build & Push Frontend
      ################################################

      - name: Build Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: khalilart/expense-tracker-frontend:latest

      ################################################
      # Kubernetes Deployment
      ################################################

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure Kubernetes
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config

      - name: Restart Backend Deployment
        run: kubectl rollout restart deployment expense-backend-deployment

      - name: Restart Frontend Deployment
        run: kubectl rollout restart deployment expense-frontend-deployment

      - name: Wait for Backend
        run: kubectl rollout status deployment expense-backend-deployment

      - name: Wait for Frontend
        run: kubectl rollout status deployment expense-frontend-deployment
